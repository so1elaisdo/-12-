<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>성경의 이해 퀴즈</title>
<link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #111117;
  --surface: #18181f;
  --card: #1e1e27;
  --border: #2a2a38;
  --accent: #e8c872;
  --accent2: #a78bfa;
  --accent3: #6ee7b7;
  --danger: #f87171;
  --text: #ededf5;
  --muted: #7a7a9a;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

/* ── CATEGORY ── */
#screen-category { max-width: 520px; margin: 0 auto; padding: 3.5rem 1.2rem 4rem; }
.home-title {
  font-family: 'Nanum Myeongjo', serif;
  font-size: clamp(1.7rem, 5vw, 2.3rem); font-weight: 800;
  background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  text-align: center; margin-bottom: 0.4rem;
}
.home-sub { text-align: center; color: var(--muted); font-size: 0.8rem; margin-bottom: 2.5rem; }
.cat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
.cat-btn {
  background: var(--card); border: 1px solid var(--border); border-radius: 16px;
  padding: 1.4rem 1rem 1.2rem; cursor: pointer; text-align: center;
  transition: transform 0.18s, border-color 0.18s, box-shadow 0.18s;
}
.cat-btn:hover { transform: translateY(-3px); border-color: var(--accent2); box-shadow: 0 10px 28px rgba(167,139,250,0.12); }
.cat-btn.all { grid-column: span 2; }
.cat-icon { font-size: 2rem; margin-bottom: 0.55rem; }
.cat-name { font-family: 'Nanum Myeongjo', serif; font-size: 0.98rem; font-weight: 700; color: var(--text); display: block; margin-bottom: 0.2rem; }
.cat-count { font-size: 0.68rem; color: var(--muted); }
.cat-btn[data-cat="wisdom"]  { border-top: 3px solid #f59e0b; }
.cat-btn[data-cat="interp"]  { border-top: 3px solid #a78bfa; }
.cat-btn[data-cat="between"] { border-top: 3px solid #6ee7b7; }
.cat-btn[data-cat="gospel"]  { border-top: 3px solid #f87171; }
.cat-btn[data-cat="all"]     { border-top: 3px solid var(--accent); }

/* ── LOADING ── */
#screen-loading {
  display: none; max-width: 520px; margin: 0 auto;
  padding: 6rem 2rem; text-align: center;
}
.loading-icon { font-size: 3rem; margin-bottom: 1.2rem; animation: spin 2s linear infinite; }
@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
.loading-title { font-family: 'Nanum Myeongjo', serif; font-size: 1.3rem; color: var(--accent); margin-bottom: 0.6rem; }
.loading-sub { color: var(--muted); font-size: 0.85rem; line-height: 1.6; }
.loading-dots::after { content: ''; animation: dots 1.5s infinite; }
@keyframes dots { 0%{content:'';} 33%{content:'.';} 66%{content:'..';} 100%{content:'...';} }

/* ── QUIZ ── */
#screen-quiz { display: none; }
.quiz-header {
  background: var(--surface); border-bottom: 1px solid var(--border);
  padding: 0.9rem 1.2rem 0;
}
.quiz-header-top { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 0.75rem; }
.back-btn {
  background: none; border: 1px solid var(--border); border-radius: 8px;
  color: var(--muted); padding: 0.3rem 0.65rem; font-size: 0.75rem;
  font-family: 'Noto Sans KR', sans-serif; cursor: pointer; transition: all 0.15s; flex-shrink: 0;
}
.back-btn:hover { color: var(--text); border-color: var(--muted); }
.quiz-cat-label { flex: 1; font-size: 0.73rem; color: var(--muted); letter-spacing: 0.06em; text-transform: uppercase; }
.score-inline { display: flex; align-items: center; gap: 0.55rem; flex-shrink: 0; }
.sc-pill { display: flex; align-items: center; gap: 0.28rem; font-size: 0.8rem; font-weight: 700; }
.sc-pill .sc-dot { width: 7px; height: 7px; border-radius: 50%; }
.sc-pill.ok { color: var(--accent3); } .sc-pill.ok .sc-dot { background: var(--accent3); }
.sc-pill.bad { color: var(--danger); } .sc-pill.bad .sc-dot { background: var(--danger); }
.sc-div { width: 1px; height: 14px; background: var(--border); }
.progress-track { height: 3px; background: var(--border); margin: 0 -1.2rem; }
.progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent2), var(--accent)); transition: width 0.4s ease; }
.quiz-body { max-width: 560px; margin: 0 auto; padding: 1.4rem 1.2rem 3rem; }
.q-counter { font-size: 0.72rem; color: var(--muted); margin-bottom: 1rem; text-align: right; }
.question-card {
  background: var(--card); border: 1px solid var(--border); border-radius: 16px;
  padding: 1.4rem 1.3rem; margin-bottom: 1rem; animation: fadeUp 0.25s ease;
}
@keyframes fadeUp { from{opacity:0;transform:translateY(8px);} to{opacity:1;transform:translateY(0);} }
.q-type-badge {
  display: inline-block; font-size: 0.62rem; font-weight: 700;
  letter-spacing: 0.08em; padding: 0.18rem 0.5rem; border-radius: 4px; margin-bottom: 0.8rem;
}
.q-type-badge.classify { background: rgba(110,231,183,0.13); color: var(--accent3); }
.q-type-badge.who      { background: rgba(248,113,113,0.13); color: var(--danger); }
.q-type-badge.gospel3  { background: rgba(167,139,250,0.13); color: var(--accent2); }
.q-type-badge.concept  { background: rgba(232,200,114,0.13); color: var(--accent); }
.question-text { font-family: 'Nanum Myeongjo', serif; font-size: 1.05rem; line-height: 1.8; color: var(--text); }
.options { display: flex; flex-direction: column; gap: 0.55rem; margin-top: 1.1rem; }
.opt-btn {
  background: var(--surface); border: 1px solid var(--border); border-radius: 11px;
  padding: 0.8rem 1rem; text-align: left; color: var(--text);
  font-size: 0.88rem; font-family: 'Noto Sans KR', sans-serif;
  cursor: pointer; transition: all 0.15s; display: flex; align-items: center; gap: 0.65rem;
}
.opt-label {
  width: 22px; height: 22px; border-radius: 50%; background: var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 0.68rem; font-weight: 700; flex-shrink: 0; color: var(--muted); transition: all 0.15s;
}
.opt-btn:hover:not(:disabled) { border-color: var(--accent2); background: rgba(167,139,250,0.07); }
.opt-btn:hover:not(:disabled) .opt-label { background: var(--accent2); color: #fff; }
.opt-btn.correct { border-color: var(--accent3); background: rgba(110,231,183,0.08); }
.opt-btn.correct .opt-label { background: var(--accent3); color: #111; }
.opt-btn.wrong   { border-color: var(--danger);  background: rgba(248,113,113,0.08); }
.opt-btn.wrong .opt-label   { background: var(--danger);  color: #fff; }
.opt-btn:disabled { cursor: default; }
.explanation {
  margin-top: 0.85rem; padding: 0.8rem 1rem;
  background: rgba(167,139,250,0.06); border-left: 3px solid var(--accent2);
  border-radius: 0 8px 8px 0; font-size: 0.81rem; color: var(--muted); line-height: 1.65;
  animation: fadeUp 0.2s ease;
}
.explanation strong { color: var(--text); }
.next-btn {
  width: 100%; padding: 0.9rem;
  background: linear-gradient(135deg, var(--accent2), #6d28d9);
  border: none; border-radius: 12px; color: #fff; font-size: 0.92rem;
  font-family: 'Noto Sans KR', sans-serif; font-weight: 700; cursor: pointer; margin-top: 0.4rem;
  transition: opacity 0.15s;
}
.next-btn:hover { opacity: 0.88; }

/* ── RESULT ── */
#screen-result { display: none; max-width: 520px; margin: 0 auto; padding: 3rem 1.2rem 5rem; text-align: center; }
.result-emoji { font-size: 3.5rem; margin-bottom: 0.7rem; }
.result-title { font-family: 'Nanum Myeongjo', serif; font-size: 1.7rem; font-weight: 800; color: var(--accent); margin-bottom: 1.6rem; }
.score-cards { display: flex; gap: 0.9rem; justify-content: center; margin-bottom: 1rem; }
.score-card { flex: 1; max-width: 130px; border-radius: 16px; padding: 1.3rem 0.5rem 1.1rem; display: flex; flex-direction: column; align-items: center; gap: 0.3rem; }
.score-card.ok  { background: rgba(110,231,183,0.12); border: 1.5px solid rgba(110,231,183,0.4); }
.score-card.bad { background: rgba(248,113,113,0.12); border: 1.5px solid rgba(248,113,113,0.4); }
.score-card .sc-n { font-size: 2.8rem; font-weight: 800; line-height: 1; }
.score-card.ok .sc-n { color: var(--accent3); }
.score-card.bad .sc-n { color: var(--danger); }
.score-card .sc-l { font-size: 0.75rem; color: var(--muted); margin-top: 0.1rem; }
.result-pct { font-size: 0.9rem; color: var(--muted); margin-bottom: 2rem; }
.result-pct strong { color: var(--text); font-size: 1.05rem; }
.result-actions { display: flex; flex-direction: column; gap: 0.7rem; margin-bottom: 2.5rem; }
.btn-retry {
  padding: 0.9rem; background: linear-gradient(135deg, var(--accent2), #6d28d9);
  border: none; border-radius: 12px; color: #fff;
  font-size: 0.92rem; font-family: 'Noto Sans KR', sans-serif; font-weight: 700; cursor: pointer;
}
.btn-home {
  padding: 0.8rem; background: var(--card); border: 1px solid var(--border);
  border-radius: 12px; color: var(--muted); font-size: 0.88rem;
  font-family: 'Noto Sans KR', sans-serif; cursor: pointer; transition: all 0.15s;
}
.btn-home:hover { color: var(--text); border-color: var(--muted); }
.wrong-header { display: flex; align-items: center; gap: 0.5rem; font-size: 0.85rem; font-weight: 700; color: var(--danger); margin-bottom: 0.9rem; text-align: left; }
.wrong-item { background: var(--card); border: 1px solid var(--border); border-left: 3px solid var(--danger); border-radius: 12px; padding: 0.9rem 1rem; margin-bottom: 0.65rem; text-align: left; }
.wi-q { font-size: 0.84rem; color: var(--text); line-height: 1.55; margin-bottom: 0.35rem; }
.wi-a { font-size: 0.78rem; color: var(--accent3); font-weight: 600; margin-bottom: 0.25rem; }
.wi-exp { font-size: 0.74rem; color: var(--muted); line-height: 1.55; }
</style>
</head>
<body>

<div id="screen-category">
  <div class="home-title">✦ 성경의 이해 퀴즈</div>
  <div class="home-sub">한동대학교 · 필기 & PPT 통합본 · AI 생성 문제</div>
  <div class="cat-grid">
    <button class="cat-btn" data-cat="wisdom" onclick="startQuiz('wisdom')">
      <div class="cat-icon">📜</div>
      <span class="cat-name">지혜문학 & 성문서</span>
      <span class="cat-count">AI 생성 · 매번 새 문제</span>
    </button>
    <button class="cat-btn" data-cat="interp" onclick="startQuiz('interp')">
      <div class="cat-icon">🔍</div>
      <span class="cat-name">성서해석학</span>
      <span class="cat-count">AI 생성 · 매번 새 문제</span>
    </button>
    <button class="cat-btn" data-cat="between" onclick="startQuiz('between')">
      <div class="cat-icon">⚔️</div>
      <span class="cat-name">신구약 중간기</span>
      <span class="cat-count">AI 생성 · 매번 새 문제</span>
    </button>
    <button class="cat-btn" data-cat="gospel" onclick="startQuiz('gospel')">
      <div class="cat-icon">✝️</div>
      <span class="cat-name">마태 · 마가 · 누가</span>
      <span class="cat-count">AI 생성 · 매번 새 문제</span>
    </button>
    <button class="cat-btn all" data-cat="all" onclick="startQuiz('all')">
      <div class="cat-icon">🌟</div>
      <span class="cat-name">전체 랜덤</span>
      <span class="cat-count">AI 생성 · 매번 새 문제</span>
    </button>
  </div>
</div>

<div id="screen-loading">
  <div class="loading-icon">✦</div>
  <div class="loading-title">문제를 생성하고 있어요</div>
  <div class="loading-sub">AI가 매번 새로운 문제를 만들고 있어요<br><span class="loading-dots"></span></div>
</div>

<div id="screen-quiz">
  <div class="quiz-header">
    <div class="quiz-header-top">
      <button class="back-btn" onclick="goHome()">← 홈</button>
      <span class="quiz-cat-label" id="quiz-cat-label"></span>
      <div class="score-inline">
        <span class="sc-pill ok"><span class="sc-dot"></span><span id="live-correct">0</span></span>
        <span class="sc-div"></span>
        <span class="sc-pill bad"><span class="sc-dot"></span><span id="live-wrong">0</span></span>
      </div>
    </div>
    <div class="progress-track"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
  </div>
  <div class="quiz-body">
    <div class="q-counter" id="q-counter"></div>
    <div id="question-area"></div>
  </div>
</div>

<div id="screen-result">
  <div class="result-emoji" id="result-emoji"></div>
  <div class="result-title" id="result-title"></div>
  <div class="score-cards">
    <div class="score-card ok"><div class="sc-n" id="res-correct">0</div><div class="sc-l">✅ 정답</div></div>
    <div class="score-card bad"><div class="sc-n" id="res-wrong">0</div><div class="sc-l">❌ 오답</div></div>
  </div>
  <div class="result-pct" id="result-pct"></div>
  <div class="result-actions">
    <button class="btn-retry" onclick="retryQuiz()">🔄 같은 범위 새 문제로 다시</button>
    <button class="btn-home" onclick="goHome()">🏠 카테고리로 돌아가기</button>
  </div>
  <div id="wrong-section"></div>
</div>

<script>
// ── 카테고리별 학습 자료 ──
const studyData = {
  wisdom: `
[지혜문학 & 성문서 핵심 내용]

■ 지혜문학이란
- 토라·예언서와 달리 이스라엘 역사·언약을 깊이 다루지 않음
- 대신 인간 실존의 다양한 삶의 정황을 하나님 시각으로 씨름하며 축적한 지혜 제공
- 포함 책: 욥기, 잠언, 전도서(지혜문학) / 시편 / 아가서
- 핵심 명제: "여호와를 경외함이 지혜의 시작이다"
- 비역사적 성격: 출애굽, 시내산 언약, 약속의 땅, 다윗 왕조 주제가 거의 등장 안 함
- 경외 = 하나님의 주권과 거룩 앞에서의 겸손한 경건

■ 율법 vs 예언 vs 지혜 비교
- 핵심질문: 율법=하나님이 무엇을 명하셨는가 / 예언=하나님이 지금 무엇을 말씀하시는가 / 지혜=삶은 어떻게 작동하는가
- 권위근거: 율법=시내산 언약 / 예언="여호와의 말씀이니라" / 지혜=관찰·경험·성찰
- 역사적 초점: 율법=출애굽·언약 / 예언=이스라엘 심판과 회복 / 지혜=보편적 인간 경험
- 대표인물: 율법=모세 / 예언=이사야·예레미야 / 지혜=솔로몬·현자들

■ 지혜의 세 영역
1. 하나님과의 관계 - 여호와를 경외함
2. 타인과의 관계 - 모든 사람은 하나님의 형상
3. 자기 자신과의 관계 - 피조물로서의 자기 위치 인식

■ 잠언
- 주제: 하나님의 창조 질서 안에서 지혜롭게 사는 법
- 핵심 원리: 인과응보 (의→복, 악→파멸) = 지혜문학의 정론(orthodoxy)
- 잠언의 격언 = 절대적 약속이 아닌 삶의 일반적 경향 (이걸 놓치면 욥기·전도서 오해)
- 잠언 8장: 지혜는 하나님의 창조에 참여한 인격적 존재로 묘사됨
- 키워드: 질서를 확인 / 어조: 낙관적·교훈적

■ 욥기
- 주제: 의로운 자가 고난받을 때 신앙은 어디에 서는가?
- 욥은 우스 땅의 의인 → 극심한 고난 → 잠언의 틀로 설명 불가
- 구조: 서언(1~2장, 산문체) / 중심부(운문체, 세 번 반복 대화논쟁+세 번 독백) / 결언(산문체)
- 키워드: 질서에 항변 / 어조: 변증적·논쟁적
- 고난에 대한 관점 비교
  · 사탄: 사람은 고난 없이 축복받을 때만 하나님을 믿는다
  · 세 친구: 고난은 하나님이 죄를 심판하시는 것(인과응보)
  · 엘리후: 고난은 하나님이 우리를 가르치시고 단련시키시는 방법
  · 하나님: 고난은 이해할 수 없어도 하나님 그분 자체를 전적으로 믿게 하는 것
- 핵심 질문: "욥이 어찌 까닭 없이 하나님을 경외하리이까?" (사탄의 반문)
- 욥기의 답: 지혜자/의인은 까닭과 이유가 없어도 하나님을 경외하는 사람이다
- 하나님의 응답: 욥의 질문에 직접 대답 않음, 창조의 광대함과 신비를 보여줌, 고난의 이유는 끝내 제시 안 됨
- 욥의 고백: "제가 주님을 귀로만 들었는데, 이제는 제 눈으로 주님을 뵈었습니다"

■ 전도서
- 저자: 코헬렛(Qoheleth) = 회중에게 말하는 자, 지혜 교사 (복음 전도자 X)
- 낭독 절기: 초막절(Sukkot)
- 키워드: 질서를 회의 / 어조: 성찰적·회의적
- 핵심 키워드 헤벨(hevel): 헛되다, 37회 사용, 원래 뜻=안개·숨결·수증기, 비유=덧없음·파악 불가능성·불확실성, 수미상관법으로 사용
- 핵심 키워드 해 아래(under the sun): 29회 사용, 하나님 없이 인간의 시각으로만 보는 삶, 반대=해 위(하나님의 관점)
- 결론: "일의 결국을 다 들었으니 하나님을 경외하고 그의 명령들을 지킬지어다. 이것이 모든 사람의 본분이니라"
- Life under the sun(해 아래 삶) → 헛됨 / Life under the Son(하나님 아래 삶) → 참된 의미
- 카르페 디엠: 기쁘게 사는 것, 살면서 좋은 일을 하는 것

■ 시편
- 히브리 명칭: 테힐림 = 찬양들
- 율법서: 하나님→인간 방향 / 시편: 인간→하나님 방향
- 총 150편, 신약에서 가장 많이 인용되는 구약의 책

■ 성경이란?
- 성경의 정의: 인간의 언어 속에 담긴 하나님의 계시
- 하나님의 말씀이 인간의 언어로 기록됨
- 과거 인간 저자가 기록한 역사적 기록이자 동시에 오늘 우리를 위한 하나님의 말씀 → 긴장 존재
- 시대와 환경, 역사를 초월한 하나님의 계시로써의 차원과 인간으로서의 차원

■ 해석 방법론 세 가지
1. 저자 중심 읽기 (강의에서 중심으로 다룸): 저자의 의도를 찾는 것
2. 텍스트 중심 읽기: 텍스트의 구조·언어·문학적 장치에 집중
3. 독자 중심 읽기: 읽는 사람마다 해석이 다름 (성서해석학에서는 잘 사용 안 함 → 주관적, 이단 위험)

■ 독자와 텍스트의 관계
- 현재 우리는 2차 독자, 복음서를 처음 받아 읽던 사람들이 1차 독자
- "성경은 우리를 위해 쓰였지만 우리에게 쓰여지지 않았다"
- 텍스트는 저자의 문맥에서 '해석'된 후, 독자의 문맥에서 '적용'될 수 있다

■ 핵심 개념
- exegesis(석의): 본문에서 의미를 "끌어내는" 해석, 저자 의도·배경 찾기, 객관적 접근법
- eisegesis(자기해석): 본문 안으로 의미를 "집어넣는" 해석, 독자의 선입견 투영, 주관적 접근
- "석의의 가장 중요한 원리: 저자의 의도가 해석의 기준이 된다"

■ 핵심 질문
"저자가 의도한 의미는 저자가 원래 청중에게 무엇을 말하려 했는가?"

■ 역사-문법적 방법
기록된 시대, 사회적 배경, 헬라어 단어, 문법 분석, 직접 문맥 등을 고려한 해석
→ 객관적 기준 제공, 자의적 해석 방지

■ 독자 중심 해석의 문제점
1. 해석학적 다원주의의 위험성
2. 텍스트 의미 왜곡 가능성 ("텍스트는 죽고 독자의 투영만 남는다")

■ 성경 문자주의의 문제
성경에는 수많은 언어적 특징, 장르, 목적, 표현법과 기술이 사용됨
→ 문자 그대로만 받아들이면 위험, 체계적 해석 필요

■ 해석의 핵심 요소
독자/해석자, 텍스트, 저자, 맥락

■ 문학적 접근 원칙
1. 본래적 의미를 찾아야 한다
2. 문학적 형태에 따라 해석해야 한다
3. 문맥에 따라 해석해야 한다

■ 신약성서의 주제
- "예수는 주이자 그리스도이시다"
- "예수는 하나님 나라의 왕이시다"
- 역사적 예수: 부활 이전의 예수, "하나님 나라" 선포, 인간 예수
- 신앙의 그리스도: 부활 이후, 다스리는 왕, 승리한 예수

■ 복음
- 1세대 복음: 왕의 승전 소식, 로마의 새 통치자 탄생
- 2세대 복음: 예수를 칭함 → "예수가 하나님 나라의 왕이시다"

■ 언약
- 구약: 아브라함의 자손들만
- 신약: 아브라함의 자손뿐만 아니라 예수를 믿는 누구나 하나님 나라의 백성이 될 수 있다

■ 하나님의 나라
- '이미(already)'와 '아직(not yet)'의 긴장 사이에 존재
- 예수가 오신 날 출범 → 예수가 다시 오실 때 완성(종말 = 기독교에서 좋은 표현)

■ 주기도문
- 3개의 당신 청원: 하나님의 나라가 임하게 하소서 / 하나님의 이름이 거룩히 여겨지게 / 하나님의 뜻이 이루어지게
- 3개의 우리 청원

■ 개요
- 신구약 중간기 = 제2성전 시대
- 이동용 성전 → 솔로몬 성전(제1성전) → 바벨로니아 포로 후 재건(제2성전)

■ 제국 순서
바벨로니아/페르시아 제국 → 그리스/헬라 제국(알렉산더가 세움) → 로마 제국

■ 알렉산더와 헬라화
- 알렉산더 대왕: 정복한 땅마다 알렉산드리아를 건설, 도서관(켈수스)
- 알렉산더 사후 후계자 없음 → 디아도키(장군) 시대 → 땅을 힘이 센 순서대로 나눔
- 이스라엘의 헬라화 진행

■ 안디오쿠스 4세
- 유대 박해 정책: 성전에서 제우스 숭배(돼지 제사 강요)
- → 반란의 열망, 종교적 신앙의 정체성이 무너지는 것을 극도로 싫어함

■ 역사적 흐름
1. 포로기 및 포로귀환기 - 북이스라엘, 남유다의 멸망, 성전 재건
2. 그리스/헬라 점령기 - 알렉산더 대왕의 죽음 이후 분할 통치
3. 하스모니안 왕조 - 시리아군을 몰아내고 사마리아와 이두매 통합
4. 로마 점령기 - 제국의 억압과 식민지, 메시아 갈망 증가

■ 유대교의 형성
- 경전(토라) / 회당(지역 예배처) / 랍비(토라 교사)
- 특징: 유일신 신앙, 안식일 준수, 정결법 준수
- 율법이 어느 때보다 강조되는 시대

■ 율법의 울타리
- "율법에 울타리를 쳐라!"
- 안식일에 불 못 피움, 노동 안 됨, 900보 이상 못 걸음 등 세분화된 규정
- 목적: 율법을 더 잘 지키자 → 결과: 율법 자체를 지키는 것이 목적이 됨
- 예수님이 안식일에 사람을 고치자 → 바리새파가 예수를 죽이려 모의

■ 유대교 4대 종파

1. 바리새파
- 평민 출신이 많음
- 율법에 울타리를 세워 하나님의 나라 도래 기대
- 반로마파, 진보
- 구전율법 추구
- 형식주의(율법 지키는 것 자체에 집중)

2. 사두개파
- 예루살렘 성전 중심, 제사장·성전 관련 기득권
- 핵심관심: 성전에서 제사드리는 일
- 친로마파(성전 유지를 위해), 보수
- 구전율법 인정 안 함(모세오경만)
- 성전 무너진 이후 사라짐
- 바리새파와 사이가 좋지 않음(보수 vs 진보)

3. 열심당(zealot/셀롯)
- 극반로마파 - 로마는 없애버려야 할 민족
- 무장 항쟁·암살·반란을 통해 하나님의 나라 도래
- 로마 세금을 빼앗아 유대인들에게 나눠줌
- 로마 세금 내는 것을 극도로 싫어함
- 예수님 시험: "로마 황제에게 세금을 내도 됩니까?" (열심당과의 관련)

4. 에세네파
- 광야로 나가 자신들만의 공동체 꾸림
- 엄청난 문서들을 작성 (사해 문서)
- 속세에 관심 없음
- 세례 요한: 광야에서 메뚜기와 석청(야생꿀)을 먹으며 삶 - 에세네파와 연결

■ 공관복음
- 공관복음(synoptic) = 같은 곳을 바라보다, 함께 보다
- 마태, 마가, 누가 - 구조·내용·어조·시간 전개 속도가 거의 동일

■ 공관복음 문제 (두 자료설)
- 마가복음 661절 → 마태복음에 동일하게 약 600절 사용됨
- 마태와 누가에만 있는 내용(예수님 어록) = Q자료
- 마가복음이 가장 먼저 쓰였다는 증거
- Q자료가 담긴 문서가 아직 발견되지 않아 "theory"라고 부름

■ 공관복음 vs 요한복음 차이
- 공관복음: 예수의 탄생으로 시작, 예루살렘 한 번 방문, 갈릴리 사역 중심, 예수님의 비유 있음
- 요한복음: 갈릴리와 예루살렘 사역 교대, 예루살렘 3번 방문, 비유 전혀 없음, 말 중심(기적 묘사 방식 다름)

■ 마가복음
- 마가: 예수님 제자 아님, 2세대 (마태·요한은 예수님 임종까지 함께한 1세대)
- 신뢰성 근거: 베드로의 제자였음, 베드로에게 들은 이야기를 가장 먼저 기록
- 주요 독자: 이방인
- 강조하는 예수: 섬기는 종, 고난받는 예수
- 대표 구절: "인자가 온 것은 섬김을 받으려 함이 아니라 섬김을 하러 온 것이다"
- 예수의 자기 호칭: 인자(사람의 아들) → 유대인에게는 메시아를 지칭

■ 마가복음 구조
- 1~8장: 갈릴리 지역(가버나움 중심), 가르치고 고치시고 전파하심
- 8~10장: 예루살렘 향하는 여정
- 11~16장: 예루살렘(입성·고난), 책의 절반이 예루살렘

■ 마가복음 특징
1. 말은 적게, 활동은 많이 - 17개의 기적 이야기 = 섬기는 종의 모습
2. 예수 이야기의 절정은 고난과 십자가 - 십자가 중심성
3. 큰 긴박성 - "곧(즉시)"이라는 단어 빈번, but 8장을 반환점으로 이야기가 느려짐
4. 세련되지 못한 헬라어, 역사적 현재법 사용(생동감)
   → 마태와 누가는 역사적 현재법을 과거형으로 바꿈
5. 예수의 인간적인 면 강조 - 피곤·배고픔·감정 등 (마가만의 특징)
6. 제자들에 대한 부정적 이미지 강함
   - "믿음이 없느냐"(마가) → "믿음이 적으냐"(마태·누가)로 순화
7. 메시아 비밀: 병자를 고치시고 "아무에게도 말하지 말라" 명령
   → 이유: 군사적·무력적 메시아 기대가 확산되는 것을 막기 위해

■ 마태복음
- 독자층: 유대인
- 강조하는 예수: 왕이신 메시아, 다윗의 후손
- 마가의 90%를 포함, 분량은 마가의 약 2배
- 마가 대비: 과거는 과거형으로, 정확성 기여 / 표현 순화
- 예수의 또 다른 이름: 임마누엘 = "우리와 함께 하시는 하나님"
  → 임마누엘로 시작~끝: 수미상관 구조
- 12개의 구약 성취 인용문으로 예수가 메시아임을 증명
- 구약성서 60회 가량 참조·인용
- 5부 구조 → 모세오경을 떠올리게 함
- 핵심: 주기도문(3개 당신청원 + 3개 우리청원)
- 13장: 하나님 나라 비유
- 들러리 비유·달란트 비유 = "하나님 나라는 준비된 자들만 들어갈 수 있다, 그날을 준비해라!"
- 산상수훈의 결론: "먼저 하나님의 나라와 하나님의 의를 구하라"
- 탄생 장면: 동방박사의 경배

■ 누가복음
- 누가: 교육받은 사람, 문체가 수려함, 2세대(예수님과 함께하지 않음)
- 1부 누가복음 + 2부 사도행전 = 누가행전
- 수신자: 데오빌로 = "하나님을 사랑하는 자"
  → 해석1: 실제 후원자(비싼 양피지가 증거) / 해석2: 하나님을 사랑하는 자들을 위해 작성
- 강조하는 예수: 온 세상의 구원자/구주
  → "구원" 관련 단어가 다른 복음서에 비해 압도적으로 많음
- 특징: 예루살렘 상경기(예루살렘 향하는 길)가 책의 절반을 차지
- 예루살렘 탄생→죽음→부활→사도바울 투옥 = 장소가 모두 예루살렘
- 사회적 약자에 대한 관심: 가난한 자, 여성, 고아, 과부
- 병을 상세히 묘사, 시선이 병든 사람들에게
- 기도에 대한 강조
- 구원의 현재성 강조("오늘"이라는 단어)
- 특징적 비유: 잃어버린 양 비유, 선한 사마리아인 비유(강도·사마리아인)
- 탄생 장면: 목자들의 경배(사회·경제적 하층민)
- 마가복음의 빠른 속도감 vs 누가복음의 예수님은 예루살렘을 향해 집중적으로 나아가심

};

const catColors = {
  wisdom: '#f59e0b', interp: '#a78bfa', between: '#6ee7b7', gospel: '#f87171', all: '#e8c872'
};

// ── STATE ──
let currentCat = '';
let questions = [];
let currentIdx = 0;
let score = 0;
let wrongCount = 0;
let answered = false;
let wrongAnswers = [];

// ── API 문제 생성 ──
async function generateQuestions(cat) {
  const catList = cat === 'all' ? ['wisdom', 'interp', 'between', 'gospel'] : [cat];
  const numPerCat = cat === 'all' ? 5 : 15;

  let content = '';
  catList.forEach(c => { content += studyData[c]; });

  const prompt = `당신은 한국 대학교 "성경의 이해" 과목의 퀴즈 출제자입니다.
아래 강의 필기 자료를 바탕으로 객관식 퀴즈를 ${catList.length * numPerCat}개 생성해주세요.

[강의 필기 자료]
${content}

[출제 규칙]
1. 문제 유형을 반드시 다양하게 섞어주세요:
   - "classify" 유형: "~의 특징으로 옳은 것은?", "~에 해당하는 것은?", "~을 설명하는 것으로 옳은 것은?"
   - "who" 유형: "~한 행동을 한 인물/종파는?", "~의 배경이 된 인물은?"
   - "concept" 유형: "~이란 무엇인가?", "~의 뜻은?", "~가 의미하는 것은?"
   - gospel3 유형(복음서 문제만): 보기를 반드시 "마태복음", "마가복음", "누가복음" 3개로만 구성
2. 보기 구성 시 절대 금지사항:
   - 하나님/예수/성령을 보기로 섞어 내지 말 것 (삼위일체 혼동 유발)
   - 모호하거나 정답이 여러 개인 문제 금지
   - 보기는 항상 4개 (gospel3 유형은 3개)
3. 교수님 출제 스타일 반영:
   - "이런 특징을 가진 책/종파/인물은?" 형태의 분류형 문제 많이 낼 것
   - 구체적인 개념어·용어·사건 중심으로 출제
   - 정확한 구분이 필요한 문제 (예: 바리새파 vs 사두개파, 마태 vs 마가 vs 누가)
4. 같은 문제가 반복되지 않도록 다양한 각도로 출제

반드시 아래 JSON 형식으로만 출력하세요. 다른 텍스트는 절대 포함하지 마세요:
[
  {
    "type": "classify",
    "q": "문제 텍스트",
    "opts": ["보기1", "보기2", "보기3", "보기4"],
    "ans": 0,
    "exp": "해설 텍스트 (2~3문장)"
  }
]
ans는 opts 배열에서 정답의 인덱스(0~3).`;

  const res = await fetch('https://corsproxy.io/?https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': '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QAA',
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 8000,
      messages: [{ role: 'user', content: prompt }]
    })
  });

  const data = await res.json();
  const text = data.content?.find(b => b.type === 'text')?.text || '[]';
  const clean = text.replace(/```json|```/g, '').trim();
  return JSON.parse(clean);
}

async function startQuiz(cat) {
  currentCat = cat;
  show('screen-loading');

  try {
    const generated = await generateQuestions(cat);
    // 보기 셔플
    questions = generated.map(q => {
      const indexed = q.opts.map((o, i) => ({ text: o, isAns: i === q.ans }));
      const shuffled = shuffle(indexed);
      return { ...q, opts: shuffled.map(x => x.text), ans: shuffled.findIndex(x => x.isAns) };
    });
  } catch (e) {
    alert('문제 생성 중 오류가 발생했습니다. 다시 시도해주세요.');
    show('screen-category');
    return;
  }

  currentIdx = 0; score = 0; wrongCount = 0; answered = false; wrongAnswers = [];
  document.getElementById('quiz-cat-label').textContent = catNames[cat];
  show('screen-quiz');
  updateHeader();
  renderQuestion();
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function show(id) {
  ['screen-category','screen-loading','screen-quiz','screen-result'].forEach(s => {
    document.getElementById(s).style.display = s === id ? 'block' : 'none';
  });
}

function updateHeader() {
  document.getElementById('live-correct').textContent = score;
  document.getElementById('live-wrong').textContent = wrongCount;
  const total = questions.length;
  document.getElementById('q-counter').textContent = `${currentIdx + 1} / ${total}`;
  document.getElementById('progress-fill').style.width = ((currentIdx / total) * 100) + '%';
}

const typeLabels = {
  classify: { text: '분류 / 특징', cls: 'classify' },
  who:      { text: '누구일까요?', cls: 'who' },
  gospel3:  { text: '어느 복음서?', cls: 'gospel3' },
  concept:  { text: '개념 맞히기', cls: 'concept' },
};

function renderQuestion() {
  answered = false;
  updateHeader();
  const q = questions[currentIdx];
  const badge = typeLabels[q.type] || typeLabels.concept;
  const labels = ['①','②','③','④'];
  const optsHtml = q.opts.map((o, i) =>
    `<button class="opt-btn" onclick="selectOpt(${i})" id="opt-${i}">
      <span class="opt-label">${labels[i]}</span><span>${o}</span>
    </button>`
  ).join('');
  document.getElementById('question-area').innerHTML = `
    <div class="question-card">
      <span class="q-type-badge ${badge.cls}">${badge.text}</span>
      <div class="question-text">${q.q}</div>
      <div class="options">${optsHtml}</div>
      <div id="explanation" style="display:none;"></div>
    </div>
    <button class="next-btn" id="next-btn" onclick="nextQ()" style="display:none;">
      ${currentIdx + 1 < questions.length ? '다음 문제 →' : '결과 보기 🎓'}
    </button>`;
}

function selectOpt(i) {
  if (answered) return;
  answered = true;
  const q = questions[currentIdx];
  const btns = document.querySelectorAll('.opt-btn');
  btns.forEach(b => b.disabled = true);
  if (i === q.ans) { score++; btns[i].classList.add('correct'); }
  else { wrongCount++; btns[i].classList.add('wrong'); btns[q.ans].classList.add('correct'); wrongAnswers.push({ q: q.q, a: q.opts[q.ans], exp: q.exp }); }
  document.getElementById('live-correct').textContent = score;
  document.getElementById('live-wrong').textContent = wrongCount;
  const expDiv = document.getElementById('explanation');
  expDiv.style.display = 'block';
  expDiv.innerHTML = `<strong>${i === q.ans ? '✅ 정답!' : '❌ 오답'}</strong> ${q.exp}`;
  document.getElementById('next-btn').style.display = 'block';
}

function nextQ() {
  currentIdx++;
  if (currentIdx >= questions.length) showResult();
  else renderQuestion();
}

function showResult() {
  show('screen-result');
  const total = questions.length;
  const pct = Math.round((score / total) * 100);
  let emoji = '😔', title = '다시 도전!';
  if (pct >= 90) { emoji = '🏆'; title = '완벽해요!'; }
  else if (pct >= 70) { emoji = '🎉'; title = '잘했어요!'; }
  else if (pct >= 50) { emoji = '📚'; title = '절반 이상!'; }
  document.getElementById('result-emoji').textContent = emoji;
  document.getElementById('result-title').textContent = title;
  document.getElementById('res-correct').textContent = score;
  document.getElementById('res-wrong').textContent = wrongCount;
  document.getElementById('result-pct').innerHTML = `정답률 <strong>${pct}%</strong> · 총 ${total}문제`;
  let html = '';
  if (wrongAnswers.length > 0) {
    html = `<div class="wrong-header">❌ 틀린 문제 ${wrongAnswers.length}개</div>` +
      wrongAnswers.map(w => `<div class="wrong-item">
        <div class="wi-q">${w.q}</div>
        <div class="wi-a">✓ 정답: ${w.a}</div>
        <div class="wi-exp">${w.exp}</div>
      </div>`).join('');
  }
  document.getElementById('wrong-section').innerHTML = html;
}

function retryQuiz() { startQuiz(currentCat); }
function goHome() { show('screen-category'); }
</script>
</body>
</html>
